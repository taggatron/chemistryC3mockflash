<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 520" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#444"/>
    </marker>
    <linearGradient id="deoxyBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7bafd4"/>
      <stop offset="100%" stop-color="#5b8fb9"/>
    </linearGradient>
    <linearGradient id="oxyBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e07070"/>
      <stop offset="100%" stop-color="#c94c4c"/>
    </linearGradient>
  </defs>

  <!-- ===================== VESSELS ===================== -->

  <!-- Superior vena cava -->
  <path d="M195,30 Q195,80 200,120" fill="none" stroke="url(#deoxyBg)" stroke-width="18" stroke-linecap="round"/>
  <!-- Inferior vena cava -->
  <path d="M200,400 Q195,440 195,490" fill="none" stroke="url(#deoxyBg)" stroke-width="18" stroke-linecap="round"/>

  <!-- Pulmonary artery (splits L & R) -->
  <path d="M270,130 Q270,70 230,50" fill="none" stroke="url(#deoxyBg)" stroke-width="14" stroke-linecap="round"/>
  <path d="M270,130 Q280,60 340,40" fill="none" stroke="url(#deoxyBg)" stroke-width="14" stroke-linecap="round"/>

  <!-- Pulmonary veins (returning to left atrium) -->
  <path d="M380,140 Q420,100 440,60" fill="none" stroke="url(#oxyBg)" stroke-width="12" stroke-linecap="round"/>
  <path d="M380,160 Q430,130 460,80" fill="none" stroke="url(#oxyBg)" stroke-width="12" stroke-linecap="round"/>

  <!-- Aorta (originates from left ventricle) -->
  <path d="M365,280 L368,250 Q370,220 375,190 Q385,120 420,70 Q450,35 480,48" fill="none" stroke="url(#oxyBg)" stroke-width="18" stroke-linecap="round"/>

  <!-- ===================== HEART OUTLINE ===================== -->
  <path d="
    M200,120
    Q160,120 150,180
    L140,300
    Q135,370 200,400
    L290,450
    Q310,460 330,450
    L410,390
    Q460,350 455,280
    L445,180
    Q440,130 400,120
    Z
  " fill="#f5dede" stroke="#b44" stroke-width="3"/>

  <!-- ===================== CHAMBERS ===================== -->

  <!-- Septum (vertical wall in the middle) -->
  <line x1="305" y1="140" x2="305" y2="440" stroke="#b44" stroke-width="4"/>

  <!-- Horizontal wall separating atria from ventricles -->
  <line x1="155" y1="240" x2="305" y2="240" stroke="#b44" stroke-width="3"/>
  <line x1="305" y1="240" x2="450" y2="240" stroke="#b44" stroke-width="3"/>

  <!-- RIGHT ATRIUM fill -->
  <path d="M200,120 Q160,120 155,180 L155,240 L305,240 L305,140 Q280,130 270,130 Z" fill="#cde4f5" fill-opacity="0.6"/>
  <!-- RIGHT VENTRICLE fill -->
  <path d="M155,240 L140,300 Q135,370 200,400 L290,450 Q305,458 305,440 L305,240 Z" fill="#b0d0ec" fill-opacity="0.6"/>
  <!-- LEFT ATRIUM fill -->
  <path d="M305,140 L305,240 L450,240 Q445,180 440,130 Q440,120 400,120 Q380,125 370,130 Z" fill="#f5c0c0" fill-opacity="0.6"/>
  <!-- LEFT VENTRICLE fill -->
  <path d="M305,240 L305,440 Q310,458 330,450 L410,390 Q460,350 455,280 L450,240 Z" fill="#e8a0a0" fill-opacity="0.6"/>

  <!-- ===================== VALVES ===================== -->

  <!-- Tricuspid valve (between RA and RV) -->
  <ellipse cx="230" cy="240" rx="22" ry="6" fill="#fff" stroke="#b44" stroke-width="2"/>
  <!-- Bicuspid / Mitral valve (between LA and LV) -->
  <ellipse cx="378" cy="240" rx="22" ry="6" fill="#fff" stroke="#b44" stroke-width="2"/>

  <!-- Semi-lunar valve markers (small lines on pulmonary artery & aorta exits) -->
  <line x1="262" y1="140" x2="278" y2="140" stroke="#b44" stroke-width="2.5"/>
  <line x1="358" y1="244" x2="380" y2="244" stroke="#b44" stroke-width="2.5"/>

  <!-- ===================== CHAMBER LABELS (inside) ===================== -->
  <text x="220" y="195" text-anchor="middle" font-size="13" font-weight="bold" fill="#2a6496">Right</text>
  <text x="220" y="210" text-anchor="middle" font-size="13" font-weight="bold" fill="#2a6496">Atrium</text>

  <text x="230" y="340" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a5276">Right</text>
  <text x="230" y="355" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a5276">Ventricle</text>

  <text x="380" y="195" text-anchor="middle" font-size="13" font-weight="bold" fill="#943131">Left</text>
  <text x="380" y="210" text-anchor="middle" font-size="13" font-weight="bold" fill="#943131">Atrium</text>

  <text x="385" y="340" text-anchor="middle" font-size="13" font-weight="bold" fill="#7b2424">Left</text>
  <text x="385" y="355" text-anchor="middle" font-size="13" font-weight="bold" fill="#7b2424">Ventricle</text>

  <!-- ===================== LEADER LINES + LABELS ===================== -->

  <!-- Vena cava (superior) -->
  <line x1="195" y1="45" x2="90" y2="45" stroke="#444" stroke-width="1" marker-end="none"/>
  <line x1="90" y1="45" x2="90" y2="45" stroke="#444" stroke-width="1"/>
  <text x="88" y="42" text-anchor="end" font-size="12" fill="#333" font-weight="600">Superior</text>
  <text x="88" y="56" text-anchor="end" font-size="12" fill="#333" font-weight="600">vena cava</text>

  <!-- Vena cava (inferior) -->
  <line x1="195" y1="488" x2="90" y2="488" stroke="#444" stroke-width="1"/>
  <text x="88" y="484" text-anchor="end" font-size="12" fill="#333" font-weight="600">Inferior</text>
  <text x="88" y="498" text-anchor="end" font-size="12" fill="#333" font-weight="600">vena cava</text>

  <!-- Pulmonary artery label -->
  <line x1="285" y1="65" x2="285" y2="18" stroke="#444" stroke-width="1"/>
  <text x="285" y="14" text-anchor="middle" font-size="12" fill="#333" font-weight="600">Pulmonary artery</text>

  <!-- Pulmonary vein label -->
  <line x1="450" y1="68" x2="530" y2="42" stroke="#444" stroke-width="1"/>
  <text x="532" y="38" text-anchor="start" font-size="12" fill="#333" font-weight="600">Pulmonary</text>
  <text x="532" y="52" text-anchor="start" font-size="12" fill="#333" font-weight="600">veins</text>

  <!-- Aorta label -->
  <line x1="478" y1="48" x2="535" y2="68" stroke="#444" stroke-width="1"/>
  <text x="537" y="72" text-anchor="start" font-size="12" fill="#333" font-weight="600">Aorta</text>

  <!-- Septum label -->
  <line x1="305" y1="420" x2="305" y2="470" stroke="#444" stroke-width="1"/>
  <text x="305" y="486" text-anchor="middle" font-size="12" fill="#333" font-weight="600">Septum</text>

  <!-- Tricuspid valve label -->
  <line x1="230" y1="246" x2="130" y2="280" stroke="#444" stroke-width="1"/>
  <text x="128" y="276" text-anchor="end" font-size="11" fill="#333" font-weight="600">Tricuspid</text>
  <text x="128" y="290" text-anchor="end" font-size="11" fill="#333" font-weight="600">valve</text>

  <!-- Bicuspid (Mitral) valve label -->
  <line x1="378" y1="246" x2="500" y2="280" stroke="#444" stroke-width="1"/>
  <text x="502" y="276" text-anchor="start" font-size="11" fill="#333" font-weight="600">Bicuspid</text>
  <text x="502" y="290" text-anchor="start" font-size="11" fill="#333" font-weight="600">(mitral) valve</text>

  <!-- Semi-lunar valves label (pulmonary) -->
  <line x1="270" y1="140" x2="145" y2="140" stroke="#444" stroke-width="1"/>
  <text x="143" y="136" text-anchor="end" font-size="11" fill="#333" font-weight="600">Semi-lunar</text>
  <text x="143" y="150" text-anchor="end" font-size="11" fill="#333" font-weight="600">valves</text>

  <!-- Colour key -->
  <rect x="10" y="500" width="12" height="12" rx="2" fill="#5b8fb9"/>
  <text x="26" y="511" font-size="10" fill="#444">= Deoxygenated blood</text>
  <rect x="170" y="500" width="12" height="12" rx="2" fill="#c94c4c"/>
  <text x="186" y="511" font-size="10" fill="#444">= Oxygenated blood</text>
</svg>