<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Year 10 Chemistry C3 Mock Flashcards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Year 10 Chemistry C3 Mock Flashcards</h1>
        <p>Click on any card to reveal the answer</p>
        <!-- Foundation tier only (higher tier and toggle removed) -->
    </header>
    
    <main>
        <section class="controls" aria-label="Study controls">
            <label for="topic-filter">Topic:</label>
            <select id="topic-filter">
                <option value="all">All Topics</option>
            </select>
            <button id="shuffle-button" type="button">Shuffle</button>
            <button id="prev-button" type="button">Previous</button>
            <span id="card-counter">Card 0 of 0</span>
            <button id="next-button" type="button">Next</button>
        </section>
        <div class="flashcard-container" id="flashcard-container">
            <!-- Flashcards will be generated by JavaScript -->
        </div>
    </main>
    
    <footer>
        <p>Click "Reset All Cards" to flip all cards back to questions</p>
        <button id="reset-button">Reset All Cards</button>
    </footer>
    
    
    <!-- Modal for external links -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-content">
            <button id="modal-close" class="modal-close">&times;</button>
            <iframe id="modal-iframe" src="" title="External Content"></iframe>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
